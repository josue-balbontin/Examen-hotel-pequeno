<div class="page-container">
  <div class="page-header">
    <h2>Registro de Reservas</h2>
    <button class="boton-add" (click)="abrirModalCrear()">Crear Reserva</button>
  </div>

  <app-tabla-generica 
    [columnas]="columnas" 
    [datos]="reservas" 
    [acciones]="acciones"
    (accion)="manejarAccion($event)">
  </app-tabla-generica>
</div>

@if (cargando()) {
  <app-pantalla-carga></app-pantalla-carga>
}

@if (error()) {
  <app-mostrarerror [error]="error" [mensaje]="mensajeError"></app-mostrarerror>
}

@if (mostrarModalCrear()) {
  <app-crear-reserva 
    (cerrar)="cerrarModalCrear()" 
    (guardado)="onReservaCreada()">
  </app-crear-reserva>
}
