<div class="page-container">
  <div class="page-header">
    <h2>Usuarios</h2>
    <button class="boton-add" (click)="agregarUsuario()">Agregar</button>
  </div>

  <app-tabla-generica [columnas]="columnas" [datos]="usuarios" [acciones]="acciones">
  </app-tabla-generica>
</div>


@if(registrarUsuario()){
<app-registrar-usuario (cerrar)="cerrarModalRegistro()" (guardado)="onHuespedGuardado()">
</app-registrar-usuario>
}

@if (cargando()) {
<app-pantalla-carga></app-pantalla-carga>
}
